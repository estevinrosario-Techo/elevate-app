<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()">Cancelar</ion-button>
    </ion-buttons>
    <ion-title>{{ isEditing ? 'Editar Tarea' : 'Nueva Tarea' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="save()" [strong]="true">Guardar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Título -->
  <ion-item [class.ion-invalid]="submitted && !form.title">
    <ion-label position="stacked">Título <ion-text color="danger">*</ion-text></ion-label>
    <ion-input [(ngModel)]="form.title" placeholder="Ej: Entregar informe final..." clearInput></ion-input>
  </ion-item>
  <ion-note color="danger" *ngIf="submitted && !form.title" class="error-note">
    El título es obligatorio.
  </ion-note>

  <!-- Descripción -->
  <ion-item>
    <ion-label position="stacked">Descripción (opcional)</ion-label>
    <ion-textarea [(ngModel)]="form.description" placeholder="Notas adicionales..." [autoGrow]="true" rows="3"></ion-textarea>
  </ion-item>

  <!-- Prioridad -->
  <div class="form-section">
    <ion-label class="section-label">Prioridad</ion-label>
    <ion-segment [(ngModel)]="form.priority" class="priority-segment">
      <ion-segment-button value="high" class="seg-high">
        <ion-label>🔴 Alta</ion-label>
      </ion-segment-button>
      <ion-segment-button value="medium" class="seg-medium">
        <ion-label>🟠 Media</ion-label>
      </ion-segment-button>
      <ion-segment-button value="low" class="seg-low">
        <ion-label>🟢 Baja</ion-label>
      </ion-segment-button>
    </ion-segment>
  </div>

  <!-- Categoría -->
  <ion-item>
    <ion-label position="stacked">Categoría</ion-label>
    <ion-select [(ngModel)]="form.category" interface="action-sheet" placeholder="Seleccionar...">
      <ion-select-option *ngFor="let cat of categories" [value]="cat">{{ cat }}</ion-select-option>
    </ion-select>
  </ion-item>

  <!-- Fecha de vencimiento -->
  <ion-item>
    <ion-label position="stacked">Fecha de vencimiento</ion-label>
    <ion-input
      type="datetime-local"
      [(ngModel)]="form.dueDate"
      [min]="minDate">
    </ion-input>
  </ion-item>

  <!-- Toggle recordatorio -->
  <ion-item *ngIf="form.dueDate">
    <ion-label>Recordatorio 24h antes</ion-label>
    <ion-toggle [(ngModel)]="form.reminderEnabled" slot="end"></ion-toggle>
  </ion-item>

</ion-content>
