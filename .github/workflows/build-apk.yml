name: Build APK Elevate
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Instalar Angular CLI y Capacitor CLI
        run: npm install -g @angular/cli @capacitor/cli

      - name: Instalar Capacitor Android v5
        run: npm install @capacitor/android@5.7.8 --legacy-peer-deps

      - name: Compilar proyecto web
        run: npx ng build --configuration=production

      - name: Agregar plataforma Android
        run: npx cap add android

      - name: Capacitor sync
        run: npx cap sync android

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Permisos Gradle
        run: chmod +x android/gradlew

      - name: Compilar APK debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Elevate-APK-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
